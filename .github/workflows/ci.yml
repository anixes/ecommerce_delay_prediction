name: CI Pipeline

on:
  push:
    branches-ignore: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Check
        run: ruff check .
      - name: Run Ruff Format
        run: ruff format --check .

  smoke-build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Create Dummy Model for Smoke Test
        run: |
          mkdir -p models
          touch models/catboost_tuned.cbm
          echo "dummy model content" > models/catboost_tuned.cbm

      - name: Build API Smoke Image
        run: |
          docker build -t api-smoke -f docker/Dockerfile.api .

      - name: Build Dashboard Smoke Image
        run: |
          docker build -t dashboard-smoke -f docker/Dockerfile.dashboard .
